name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: vusallmammad

jobs:
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: game-website-api-gateway
            project: src/GameWebsite.ApiGateway/GameWebsite.ApiGateway.csproj
            publish-dir: publish/GameWebsite.ApiGateway
            dockerfile: src/GameWebsite.ApiGateway/Dockerfile.ci
          - image: game-website-mock-api
            project: src/GameWebsite.MockApi/GameWebsite.MockApi.csproj
            publish-dir: publish/GameWebsite.MockApi
            dockerfile: src/GameWebsite.MockApi/Dockerfile.ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish self-contained Linux app
        run: >
          dotnet publish ${{ matrix.project }}
          --configuration Release
          --runtime linux-x64
          --self-contained true
          --output ${{ matrix.publish-dir }}
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
