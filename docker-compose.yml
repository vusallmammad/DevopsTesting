name: game-website-practice

x-mock-api: &mock-api
  build:
    context: .
    dockerfile: src/GameWebsite.MockApi/Dockerfile
  image: game-website-mock-api
  restart: unless-stopped
  environment: &mock-api-env
    ASPNETCORE_ENVIRONMENT: Development
    ASPNETCORE_URLS: "http://+:8080;http://+:8081"
    DB_KIND: postgres
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_USER: postgres
    DB_PASSWORD: postgres
    DB_SSLMODE: disable
  depends_on:
    postgres:
      condition: service_healthy

services:
  api-gateway:
    build:
      context: .
      dockerfile: src/GameWebsite.ApiGateway/Dockerfile
    image: game-website-api-gateway
    container_name: game-api-gateway
    restart: unless-stopped
    ports:
      - "5000:8080"
      - "7000:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;http://+:8081"
      SECURITY_API_URL: http://game-security-api:8080
      PROFILE_API_URL: http://game-profile-api:8080
      GAME_API_URL: http://game-game-api:8080
      STORE_API_URL: http://game-store-api:8080
      TEAMS_API_URL: http://game-teams-api:8080
      MATCHUP_API_URL: http://game-matchup-api:8080
      TOURNAMENTS_API_URL: http://game-tournaments-api:8080
      NOTIFICATION_API_URL: http://game-notification-api:8080
    depends_on:
      - game-security-api
      - game-profile-api
      - game-game-api
      - game-store-api
      - game-teams-api
      - game-matchup-api
      - game-tournaments-api
      - game-notification-api

  game-security-api:
    <<: *mock-api
    container_name: game-security-api
    ports:
      - "5015:8080"
      - "7171:8081"
    environment:
      <<: *mock-api-env
      SERVICE_KEY: security
      SERVICE_TITLE: Security API
      DB_NAME: security

  game-profile-api:
    <<: *mock-api
    container_name: game-profile-api
    ports:
      - "5016:8080"
      - "7172:8081"
    environment:
      <<: *mock-api-env
      SERVICE_KEY: profile
      SERVICE_TITLE: Profile API
      DB_NAME: profile

  game-tournaments-api:
    <<: *mock-api
    container_name: game-tournaments-api
    ports:
      - "5017:8080"
      - "7173:8081"
    environment:
      <<: *mock-api-env
      SERVICE_KEY: tournaments
      SERVICE_TITLE: Tournaments API
      DB_NAME: tournaments

  game-teams-api:
    <<: *mock-api
    container_name: game-teams-api
    ports:
      - "5018:8080"
      - "7121:8081"
    environment:
      <<: *mock-api-env
      SERVICE_KEY: teams
      SERVICE_TITLE: Teams API
      DB_NAME: teams

  game-matchup-api:
    <<: *mock-api
    container_name: game-matchup-api
    ports:
      - "5019:8080"
      - "7175:8081"
    environment:
      <<: *mock-api-env
      SERVICE_KEY: matchup
      SERVICE_TITLE: Matchup API
      DB_NAME: matchup

  game-store-api:
    <<: *mock-api
    container_name: game-store-api
    ports:
      - "5020:8080"
      - "7174:8081"
    environment:
      <<: *mock-api-env
      SERVICE_KEY: store
      SERVICE_TITLE: Store API
      DB_NAME: store

  game-game-api:
    <<: *mock-api
    container_name: game-game-api
    ports:
      - "5021:8080"
      - "7170:8081"
    environment:
      <<: *mock-api-env
      SERVICE_KEY: game
      SERVICE_TITLE: Game API
      DB_NAME: game

  game-notification-api:
    <<: *mock-api
    container_name: game-notification-api
    ports:
      - "5022:8080"
      - "7182:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;http://+:8081"
      SERVICE_KEY: notification
      SERVICE_TITLE: Notification API
      DB_KIND: memory
    depends_on:
      cassandra:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: game-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - game_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  cassandra:
    image: cassandra:5.0
    container_name: game-cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: GameWebsitePractice
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - game_cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES;'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 45s

volumes:
  game_postgres_data:
  game_cassandra_data:
